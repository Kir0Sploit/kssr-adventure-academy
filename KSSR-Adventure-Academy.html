<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>KSSR Adventure Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{
    --c1:#7c3aed; --c2:#2563eb; --c3:#06b6d4; --gold:#fbbf24; --good:#22c55e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#0b1020;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;}
  #game{position:fixed;inset:0;overflow:hidden;}
  canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:auto;}
  .glass{background:rgba(20,24,48,.62);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);}
  .btn{cursor:pointer;transition:transform .08s,filter .15s;}
  .btn:active{transform:scale(.94);}
  .btn:hover{filter:brightness(1.12);}
  .grad{background:linear-gradient(135deg,var(--c1),var(--c2) 55%,var(--c3));}
  .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:40;}
  .overlay.show{display:flex;}
  .panel{width:min(720px,94vw);max-height:92vh;overflow:auto;border-radius:22px;padding:18px;}
  .pill{border-radius:999px;padding:4px 12px;font-weight:700;font-size:12px;}
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;z-index:20;pointer-events:none;padding:8px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  #hud .glass{pointer-events:auto;}
  .stat{display:flex;align-items:center;gap:6px;border-radius:14px;padding:6px 10px;font-weight:800;font-size:13px;}
  /* Joystick */
  #joy{position:absolute;left:18px;bottom:24px;width:130px;height:130px;border-radius:50%;z-index:30;touch-action:none;}
  #joyBase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.25);}
  #joyKnob{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#3b82f6);border:2px solid rgba(255,255,255,.6);box-shadow:0 6px 18px rgba(0,0,0,.5);}
  /* Action buttons */
  #pad{position:absolute;right:16px;bottom:24px;width:180px;height:180px;z-index:30;}
  .abtn{position:absolute;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:#fff;border:3px solid rgba(255,255,255,.5);box-shadow:0 6px 16px rgba(0,0,0,.45);touch-action:none;}
  #btnA{right:8px;top:58px;background:linear-gradient(135deg,#22c55e,#16a34a);}
  #btnB{left:8px;top:58px;background:linear-gradient(135deg,#ef4444,#b91c1c);}
  #btnX{left:58px;top:8px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
  #btnY{left:58px;bottom:8px;background:linear-gradient(135deg,#f59e0b,#d97706);}
  .topbtn{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:12px;font-size:16px;}
  .choice{display:block;width:100%;text-align:left;margin:8px 0;padding:14px 16px;border-radius:16px;font-weight:700;font-size:16px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);}
  .choice:hover{background:rgba(255,255,255,.14);}
  .choice.correct{background:linear-gradient(135deg,#22c55e,#16a34a);border-color:#fff;}
  .choice.wrong{background:linear-gradient(135deg,#ef4444,#b91c1c);border-color:#fff;}
  .toast{position:absolute;left:50%;top:14%;transform:translateX(-50%);z-index:60;padding:12px 22px;border-radius:16px;font-weight:900;font-size:20px;opacity:0;pointer-events:none;}
  .toast.show{animation:pop 1.6s ease forwards;}
  @keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.6)}15%{opacity:1;transform:translateX(-50%) scale(1.1)}30%{transform:translateX(-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
  .ach{position:absolute;right:14px;top:70px;z-index:60;width:300px;border-radius:16px;padding:12px;transform:translateX(360px);transition:transform .5s;}
  .ach.show{transform:translateX(0);}
  .fade{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .spin{animation:spin 8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .float{animation:flt 3s ease-in-out infinite;}
  @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:8px}
  .hpbar{height:18px;border-radius:10px;background:rgba(0,0,0,.4);overflow:hidden;border:1px solid rgba(255,255,255,.3)}
  .hpfill{height:100%;background:linear-gradient(90deg,#ef4444,#f97316);transition:width .4s}
  .av{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid rgba(255,255,255,.3);cursor:pointer;}
  .av.sel{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold);}
  .cert{background:#fffef8;color:#1e293b;border:14px solid #d4af37;border-radius:8px;padding:28px;text-align:center;position:relative;}
  .input{width:100%;padding:12px 14px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-weight:700;}
  @media(max-width:640px){.panel{width:96vw}}
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="flex gap-2 items-center flex-wrap">
      <div class="glass stat"><i class="fa-solid fa-user text-purple-300"></i><span id="hudName">Hero</span></div>

      <div class="glass stat"><i class="fa-solid fa-coins text-yellow-400"></i><span id="hudCoins">0</span></div>

      <div class="glass stat" style="min-width:120px"><div class="w-full"><div class="text-[10px] opacity-70" id="hudRank">Year 1 Explorer</div><div class="hpbar" style="height:8px"><div class="hpfill" id="xpfill" style="width:0%;background:linear-gradient(90deg,#22c55e,#06b6d4)"></div></div></div></div>
    </div>
    <div class="flex gap-2 items-center" style="pointer-events:auto">
      <div class="glass topbtn btn" id="langBtn" title="Language">EN</div>
      <div class="glass topbtn btn" id="mapBtn" title="Map"><i class="fa-solid fa-map"></i></div>
      <div class="glass topbtn btn" id="questBtn" title="Quests"><i class="fa-solid fa-scroll"></i></div>
      <div class="glass topbtn btn" id="invBtn" title="Inventory"><i class="fa-solid fa-bag-shopping"></i></div>
      <div class="glass topbtn btn" id="parentBtn" title="Parent"><i class="fa-solid fa-chart-line"></i></div>
      <div class="glass topbtn btn" id="menuBtn" title="Menu"><i class="fa-solid fa-bars"></i></div>
    </div>
  </div>

  <!-- Interaction prompt -->
  <div id="prompt" class="glass" style="position:absolute;left:50%;bottom:200px;transform:translateX(-50%);z-index:25;display:none;border-radius:14px;padding:8px 16px;font-weight:800">
    <i class="fa-solid fa-circle-a text-green-400"></i> <span id="promptTxt">Interact</span>
  </div>

  <!-- Mobile controls -->
  <div id="joy"><div id="joyBase"></div><div id="joyKnob"></div></div>
  <div id="pad">
    <div class="abtn btn" id="btnX">X</div>
    <div class="abtn btn" id="btnY">Y</div>
    <div class="abtn btn" id="btnB">B</div>
    <div class="abtn btn" id="btnA">A</div>
  </div>

  <!-- Toast + achievement -->
  <div class="toast" id="toast"></div>
  <div class="ach glass" id="achPop">
    <div class="flex items-center gap-3"><div class="text-3xl text-yellow-300"><i class="fa-solid fa-trophy"></i></div>
    <div><div class="text-xs opacity-70" id="achLabel">Achievement</div><div class="font-black" id="achName">Unlocked</div></div></div>
  </div>

  <!-- Generic Modal -->
  <div class="overlay" id="modal"><div class="panel glass" id="modalPanel"></div></div>
</div>

let LANG = "en";
function t(k){ return (I18N[LANG] && I18N[LANG][k]) || (I18N.en[k]||k); }

/* ---------- praise lines ---------- */
const PRAISE = { en:["Awesome!","Excellent!","Fantastic!","Brilliant!","Superb!","Well done!"], ms:["Hebat!","Mantap!","Bijak!","Cemerlang!","Syabas!","Tahniah!"] };
const ENCOURAGE = { en:["Try again!","Almost there!","Keep going!","You can do it!"], ms:["Cuba lagi!","Hampir betul!","Teruskan!","Anda boleh lakukan!"] };
function praise(){ const a=PRAISE[LANG]; return a[Math.floor(Math.random()*a.length)]; }
function encourage(){ const a=ENCOURAGE[LANG]; return a[Math.floor(Math.random()*a.length)]; }

/* ---------- Save State ---------- */
const SAVE_KEY = "kssr_adventure_save_v1";
const DEFAULT_STATE = {
  created:false, name:"Hero", avatar:0, lang:"en", audio:true,
  xp:0, coins:0, stars:0, level:1, year:1,
  region:"kampung", px:0, py:0,
  quests:{}, completedQuests:[], questItems:[],
  pets:[], activePet:null, badges:[], titles:[], collectibles:[], certificates:[],
  achievements:[], chests:[], bosses:[],
  stats:{ math:{c:0,a:0}, bm:{c:0,a:0}, eng:{c:0,a:0} },
  timePlayed:0, questsCompleted:0, lastDaily:0
};
let S = null;
function load(){
  try{ const raw=localStorage.getItem(SAVE_KEY); if(raw){ S=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)),JSON.parse(raw)); }
  }catch(e){}
  if(!S) S=JSON.parse(JSON.stringify(DEFAULT_STATE));
  LANG=S.lang||"en";
}
function save(){ try{ S.lang=LANG; localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){} }

/* ---------- Audio Engine (Web Audio API) ---------- */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function tone(freq,dur,type,vol,when){
  if(!S||!S.audio) return; const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type||"sine"; o.frequency.value=freq;
  const tt=c.currentTime+(when||0); o.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(vol||0.15,tt+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,tt+dur); o.start(tt); o.stop(tt+dur+0.02);
}
function playClick(){ tone(420,0.06,"square",0.08); }
function playCoin(){ tone(880,0.08,"square",0.1); tone(1320,0.1,"square",0.08,0.06); }
function playCorrect(){ [523,659,784].forEach((f,i)=>tone(f,0.14,"triangle",0.12,i*0.08)); }
function playWrong(){ tone(220,0.18,"sawtooth",0.08); tone(180,0.2,"sawtooth",0.07,0.08); }
function playQuestComplete(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.16,"triangle",0.12,i*0.09)); }
function playAchievement(){ [659,784,988,1318].forEach((f,i)=>tone(f,0.18,"triangle",0.13,i*0.1)); }
function playVictory(){ [523,659,784,1046,1318].forEach((f,i)=>tone(f,0.22,"square",0.12,i*0.12)); }
function playBossFight(){ tone(110,0.3,"sawtooth",0.1); tone(146,0.3,"sawtooth",0.08,0.15); }
function playLevelUp(){ [392,523,659,784,1046].forEach((f,i)=>tone(f,0.16,"triangle",0.13,i*0.08)); }

<script>
/* ============================================================
   CURRICULUM ENGINE — generates KSSR-aligned challenges
   Each returns {q_en,q_ms, choices:[...], answer:index, subject}
   ============================================================ */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function buildMC(qen,qms,correct,distract,subject){
  const opts=shuffle([correct,...distract]);
  return { q_en:qen, q_ms:qms, choices:opts.map(String), answer:opts.indexOf(correct), subject };
}

/* ---- MATH by year ---- */
function genMath(year){
  let a,b,c,d,ans,qen,qms;
  if(year<=1){
    a=ri(1,9); b=ri(1,9); ans=a+b;
    return buildMC(`A farmer has ${a} mangoes and picks ${b} more. How many now?`,`Seorang petani ada ${a} mangga dan memetik ${b} lagi. Berapa semua?`,ans,[ans+1,ans-1,ans+2].map(x=>Math.max(0,x)),"math");
  } else if(year==2){
    if(Math.random()<.5){ a=ri(10,40); b=ri(5,20); ans=a-b; return buildMC(`There are ${a} coins. You spend ${b}. How many left?`,`Ada ${a} syiling. Anda belanja ${b}. Berapa baki?`,ans,[ans+2,ans-3,ans+5],"math"); }
    a=ri(2,5); b=ri(2,5); ans=a*b; return buildMC(`${a} baskets with ${b} fruits each. Total fruits?`,`${a} bakul dengan ${b} buah setiap satu. Jumlah buah?`,ans,[ans+a,ans-b,ans+1],"math");
  } else if(year==3){
    if(Math.random()<.5){ a=ri(3,9); b=ri(3,9); ans=a*b; return buildMC(`${a} × ${b} = ?`,`${a} × ${b} = ?`,ans,[ans+a,ans-b,ans+2],"math"); }
    a=ri(2,9); ans=a; const tot=a*ri(2,6); return buildMC(`${tot} apples shared into ${tot/a} bags equally. Apples per bag?`,`${tot} epal dibahagi sama rata ke ${tot/a} beg. Berapa setiap beg?`,ans,[ans+1,ans-1,ans+3],"math");
  } else if(year==4){
    if(Math.random()<.5){ a=ri(100,900); b=ri(50,400); ans=a+b; return buildMC(`Market sold RM${a} then RM${b}. Total sales?`,`Pasar jual RM${a} kemudian RM${b}. Jumlah jualan?`,"RM"+ans,["RM"+(ans+50),"RM"+(ans-30),"RM"+(ans+10)],"math"); }
    a=ri(12,30); b=ri(3,9); ans=a*b; return buildMC(`A box holds ${a} pencils. ${b} boxes hold how many?`,`Sekotak ada ${a} pensel. ${b} kotak ada berapa?`,ans,[ans+a,ans-b,ans+10],"math");
  } else if(year==5){
    if(Math.random()<.5){ const w=ri(1,4),x=ri(5,9); const dec=(w+x/10).toFixed(1); ans=dec; return buildMC(`Add: ${w}.0 + 0.${x} = ?`,`Tambah: ${w}.0 + 0.${x} = ?`,ans,[(w+x/10+0.1).toFixed(1),(w+x/10-0.2).toFixed(1),(w+1).toFixed(1)],"math"); }
    const p=ri(1,5)*10; a=ri(20,80); ans=Math.round(a*p/100); return buildMC(`${p}% of ${a} fruits are ripe. How many ripe?`,`${p}% daripada ${a} buah sudah masak. Berapa yang masak?`,ans,[ans+2,ans-3,ans+5],"math");
  } else {
    if(Math.random()<.5){ a=ri(2,6); b=ri(2,6); c=ri(2,6); ans=a+b*c; return buildMC(`Solve: ${a} + ${b} × ${c} = ?`,`Selesaikan: ${a} + ${b} × ${c} = ?`,ans,[(a+b)*c,ans+1,ans-2],"math"); }
    const n=ri(2,5),den=ri(6,9); ans=(n/den).toFixed(2); return buildMC(`Express ${n}/${den} as a decimal (2 dp).`,`Nyatakan ${n}/${den} sebagai perpuluhan (2 t.p.).`,ans,[((n+1)/den).toFixed(2),((n-1)/den).toFixed(2),(n/den+0.1).toFixed(2)],"math");
  }
}

/* ---- BAHASA MELAYU by year ---- */
const BM_BANK = [
  {y:1,en:"Which word means 'cat'?",ms:"Perkataan manakah bermaksud 'kucing'?",a:"Kucing",d:["Anjing","Burung","Ikan"]},
  {y:1,en:"Opposite of 'besar' (big)?",ms:"Lawan bagi 'besar'?",a:"Kecil",d:["Tinggi","Panjang","Tebal"]},
  {y:1,en:"Which is a fruit (buah)?",ms:"Manakah sejenis buah?",a:"Pisang",d:["Meja","Kereta","Baju"]},
  {y:2,en:"Complete: Saya ___ ke sekolah. (go)",ms:"Lengkapkan: Saya ___ ke sekolah.",a:"pergi",d:["makan","tidur","baca"]},
  {y:2,en:"Plural builder: 'buku-buku' shows?",ms:"'buku-buku' menunjukkan kata?",a:"Jamak",d:["Tunggal","Nama khas","Kerja"]},
  {y:2,en:"Which is a colour (warna)?",ms:"Manakah sejenis warna?",a:"Merah",d:["Lari","Tinggi","Cepat"]},
  {y:3,en:"Choose the correct 'kata kerja' (verb).",ms:"Pilih 'kata kerja' yang betul.",a:"berlari",d:["cantik","meja","biru"]},
  {y:3,en:"'Rajin' is a type of?",ms:"'Rajin' ialah jenis kata?",a:"Kata adjektif",d:["Kata nama","Kata kerja","Kata hubung"]},
  {y:3,en:"Synonym of 'pandai'?",ms:"Sinonim bagi 'pandai'?",a:"Bijak",d:["Malas","Lambat","Sedih"]},

function seeded(seed){ let s=seed; return ()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }; }

function genMap(seed,w,h,opts){
  const rnd=seeded(seed); const m=[]; opts=opts||{};
  for(let y=0;y<h;y++){ const row=[]; for(let x=0;x<w;x++){
    let tile=0;
    if(x===0||y===0||x===w-1||y===h-1) tile=3; // border trees
    else { const r=rnd();
      if(r<(opts.water||0.05)) tile=1;
      else if(r<(opts.water||0.05)+(opts.tree||0.10)) tile=3;
      else if(r<0.20) tile=4;
      else tile=0;
    }
    row.push(tile);
  } m.push(row); }
  // carve a path cross through center
  const cy=Math.floor(h/2), cx=Math.floor(w/2);
  for(let x=1;x<w-1;x++){ m[cy][x]=2; if(cy+1<h-1)m[cy+1][x]=2; }
  for(let y=1;y<h-1;y++){ m[y][cx]=2; }

  for(let y=cy-1;y<=cy+2;y++)for(let x=cx-1;x<=cx+2;x++){ if(m[y]&&m[y][x]!==undefined&&m[y][x]!==2)m[y][x]=0; }
  return m;
}

function resize(){

  cv.width=VW*DPR; cv.height=VH*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);

function joyMove(e){
  if(joyId===null) return; let t;
  if(e.changedTouches){ for(const tc of e.changedTouches){ if(tc.identifier===joyId){t=tc;break;} } if(!t) return; }
  else t=e;

  let dx=t.clientX-cx, dy=t.clientY-cy; const mag=Math.hypot(dx,dy), max=r.width/2;
  if(mag>max){ dx=dx/mag*max; dy=dy/mag*max; }
  knob.style.transform=`translate(${dx}px,${dy}px)`;
  joyVec.x=dx/max; joyVec.y=dy/max;
}
function joyEnd(e){ if(e.changedTouches){ for(const tc of e.changedTouches){ if(tc.identifier===joyId){ joyId=null; } } } else joyId=null;
  if(joyId===null){ joyVec.x=0; joyVec.y=0; knob.style.transform="translate(0,0)"; } }
joy.addEventListener("touchstart",e=>{e.preventDefault();joyStart(e);},{passive:false});
joy.addEventListener("touchmove",e=>{e.preventDefault();joyMove(e);},{passive:false});
joy.addEventListener("touchend",e=>{e.preventDefault();joyEnd(e);},{passive:false});
joy.addEventListener("mousedown",joyStart); addEventListener("mousemove",e=>{if(joyId==="mouse")joyMove(e);}); addEventListener("mouseup",e=>{if(joyId==="mouse")joyEnd(e);});

/* Action buttons */
function bind(id,fn){ const el=document.getElementById(id); el.addEventListener("touchstart",e=>{e.preventDefault();fn();},{passive:false}); el.addEventListener("click",e=>{e.preventDefault();fn();}); }
bind("btnA",()=>{playClick();doInteract();});
bind("btnB",()=>{playClick();closeModal();});
bind("btnX",()=>{playClick();doHint();});
bind("btnY",()=>{playClick();toggleInventory();});

/* Tap-to-move on canvas (mouse) */
let moveTarget=null;
cv.addEventListener("click",e=>{
  if(!gameActive) return; if(document.getElementById("modal").classList.contains("show")) return;
  const wx=e.clientX+cam.x, wy=e.clientY+cam.y; moveTarget={x:wx,y:wy};
});

/* ---- GAME LOOP ---- */
let last=0, playTimer=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  if(gameActive){ update(dt); render(); 
    playTimer+=dt; if(playTimer>=5){ S.timePlayed+=Math.round(playTimer); playTimer=0; save(); }
  }
  requestAnimationFrame(loop);
}

function update(dt){
  if(document.getElementById("modal").classList.contains("show")){ player.moving=false; return; }
  let vx=0,vy=0;
  if(keys["arrowup"]||keys["w"]) vy-=1;
  if(keys["arrowdown"]||keys["s"]) vy+=1;
  if(keys["arrowleft"]||keys["a"]) vx-=1;
  if(keys["arrowright"]||keys["d"]) vx+=1;
  if(Math.abs(joyVec.x)>0.18||Math.abs(joyVec.y)>0.18){ vx+=joyVec.x; vy+=joyVec.y; moveTarget=null; }
  if(moveTarget){ const dx=moveTarget.x-player.x, dy=moveTarget.y-player.y; const m=Math.hypot(dx,dy);
    if(m<6){ moveTarget=null; } else { vx+=dx/m; vy+=dy/m; } }
  const mag=Math.hypot(vx,vy);
  player.moving=mag>0.05;
  if(player.moving){
    vx/=mag||1; vy/=mag||1;
    if(Math.abs(vx)>Math.abs(vy)) player.dir=vx>0?"right":"left"; else player.dir=vy>0?"down":"up";
    const nx=player.x+vx*player.speed*dt, ny=player.y+vy*player.speed*dt;
    if(!blocked(nx,player.y)) player.x=nx;
    if(!blocked(player.x,ny)) player.y=ny;
    player.anim+=dt*8; player.frame=Math.floor(player.anim)%4;
    S.px=player.x; S.py=player.y;
  } else { player.anim=0; player.frame=0; }
  // camera
  cam.x=player.x-VW/2; cam.y=player.y-VH/2;
  cam.x=Math.max(0,Math.min(cam.x,WORLD_W*TILE-VW));
  cam.y=Math.max(0,Math.min(cam.y,WORLD_H*TILE-VH));
  if(WORLD_W*TILE<VW) cam.x=(WORLD_W*TILE-VW)/2;
  if(WORLD_H*TILE<VH) cam.y=(WORLD_H*TILE-VH)/2;
  updatePrompt();
}

let nearEntity=null;
function updatePrompt(){
  nearEntity=null; let best=70*70;
  for(const e of entities){ if(e.type==="chest"&&S.chests.includes(e.data.id)) continue;
    const d=(e.x-player.x)**2+(e.y-player.y)**2; if(d<best){ best=d; nearEntity=e; } }
  // portals (edges) - check region travel near border path
  const p=document.getElementById("prompt"), txt=document.getElementById("promptTxt");
  if(nearEntity){
    let label=t("interact");
    if(nearEntity.type==="npc") label=(LANG==="ms"?nearEntity.data.name_ms:nearEntity.data.name_en);
    if(nearEntity.type==="chest") label=t("chest");
    if(nearEntity.type==="boss") label=t("boss")+": "+(LANG==="ms"?nearEntity.data.name_ms:nearEntity.data.name_en);
    txt.textContent="[A] "+label; p.style.display="block";
  } else p.style.display="none";
}

/* ---- RENDER ---- */
let waterAnim=0;
function render(){
  waterAnim+=0.03;
  const reg=REGIONS[curRegion];
  ctx.fillStyle=reg.color; ctx.fillRect(0,0,VW,VH);
  const x0=Math.max(0,Math.floor(cam.x/TILE)), y0=Math.max(0,Math.floor(cam.y/TILE));
  const x1=Math.min(WORLD_W,Math.ceil((cam.x+VW)/TILE)), y1=Math.min(WORLD_H,Math.ceil((cam.y+VH)/TILE));
  for(let ty=y0;ty<y1;ty++)for(let tx=x0;tx<x1;tx++){
    const sx=tx*TILE-cam.x, sy=ty*TILE-cam.y, tile=curMap[ty][tx];
    drawTile(tile,sx,sy,tx,ty,reg);
  }
  // sort entities by y for depth
  const drawables=entities.slice().sort((a,b)=>a.y-b.y);
  let drewPlayer=false;
  for(const e of drawables){
    if(!drewPlayer && e.y>player.y){ drawPlayer(); drewPlayer=true; }
    drawEntity(e);
  }
  if(!drewPlayer) drawPlayer();
}

function drawTile(tile,sx,sy,tx,ty,reg){
  // base grass
  ctx.fillStyle=reg.color; ctx.fillRect(sx,sy,TILE,TILE);
  // subtle checker
  if((tx+ty)%2===0){ ctx.fillStyle="rgba(0,0,0,0.04)"; ctx.fillRect(sx,sy,TILE,TILE); }
  if(tile===2){ // path
    ctx.fillStyle="#d6b98c"; ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle="rgba(0,0,0,0.05)"; ctx.fillRect(sx+4,sy+4,6,6);
  } else if(tile===1){ // water animated
    const w=Math.sin(waterAnim+tx*0.6+ty*0.4)*3;
    ctx.fillStyle="#38bdf8"; ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle="rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.ellipse(sx+TILE/2,sy+TILE/2+w,TILE/3,5,0,0,7); ctx.fill();
  } else if(tile===4){ // flowers
    const colors=["#f472b6","#fde047","#fb923c","#a78bfa"];
    ctx.fillStyle=colors[(tx*3+ty)%4];
    const ox=Math.sin(waterAnim+tx)*1.5;
    ctx.beginPath(); ctx.arc(sx+14+ox,sy+30,4,0,7); ctx.arc(sx+30+ox,sy+16,4,0,7); ctx.fill();
  } else if(tile===3){ // tree
    ctx.fillStyle="#7c4a1e"; ctx.fillRect(sx+TILE/2-4,sy+TILE-18,8,16);
    const sway=Math.sin(waterAnim+tx*0.5)*2;
    ctx.fillStyle=reg.accent;
    ctx.beginPath(); ctx.arc(sx+TILE/2+sway,sy+18,16,0,7); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.12)";
    ctx.beginPath(); ctx.arc(sx+TILE/2-4+sway,sy+13,6,0,7); ctx.fill();
  }
}

function drawShadow(x,y,r){ ctx.fillStyle="rgba(0,0,0,0.22)"; ctx.beginPath(); ctx.ellipse(x,y,r,r*0.4,0,0,7); ctx.fill(); }

function drawEntity(e){
  const sx=e.x-cam.x, sy=e.y-cam.y;
  if(e.type==="npc"){
    drawShadow(sx,sy+18,16);
    const bob=Math.sin(waterAnim*1.5+e.x)*2;
    ctx.font="34px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(e.data.emoji,sx,sy+bob);
    // name + indicator
    if(e.data.quest && !S.completedQuests.includes(e.data.quest.id) && !S.quests[e.data.quest.id]){
      ctx.fillStyle="#fbbf24"; ctx.font="bold 20px serif"; ctx.fillText("❗",sx+14,sy-22+bob);
    } else if(e.data.quest && S.quests[e.data.quest.id]&&!S.quests[e.data.quest.id].done){
      ctx.fillStyle="#3b82f6"; ctx.font="bold 18px serif"; ctx.fillText("…",sx+14,sy-22+bob);
    }
  } else if(e.type==="chest"){
    drawShadow(sx,sy+14,14);
    ctx.font="30px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("🎁",sx,sy);
    ctx.fillStyle="#fbbf24"; ctx.font="bold 16px serif"; ctx.fillText("✨",sx+12,sy-16);
  } else if(e.type==="boss"){
    drawShadow(sx,sy+22,24);
    const bob=Math.sin(waterAnim*2+e.x)*3;
    ctx.font=(e.done?"40px":"48px")+" serif"; ctx.globalAlpha=e.done?0.5:1; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(e.data.emoji,sx,sy+bob); ctx.globalAlpha=1;
    if(!e.done){ ctx.fillStyle="#ef4444"; ctx.font="bold 22px serif"; ctx.fillText("⚔️",sx+20,sy-26+bob); }
  }
}

function drawPlayer(){
  const sx=player.x-cam.x, sy=player.y-cam.y;
  drawShadow(sx,sy+18,15);
  const bob=player.moving?Math.abs(Math.sin(player.anim*1.5))*3:Math.sin(waterAnim)*1;
  // body
  ctx.font="36px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(AVATARS[S.avatar]||"🦸",sx,sy-bob);
  // direction arrow indicator
  ctx.fillStyle="rgba(255,255,255,0.5)";
  // pet follows
  if(S.activePet && PET_INFO[S.activePet]){
    const px=sx-22, py=sy+10+Math.sin(waterAnim*2)*2;
    drawShadow(px,py+10,9);
    ctx.font="22px serif"; ctx.fillText(PET_INFO[S.activePet].emoji,px,py);
  }
}
requestAnimationFrame(loop);
</script>
<script>
/* ============================================================
   PROGRESSION + REWARDS + HUD
   ============================================================ */
function xpForLevel(lv){ return 100+lv*60; }
function updateHUD(){
  document.getElementById("hudName").textContent=S.name;
  document.getElementById("hudStars").textContent=S.stars;
  document.getElementById("hudCoins").textContent=S.coins;
  document.getElementById("hudLvl").textContent=S.level;
  document.getElementById("hudRank").textContent=RANKS[Math.min(S.year-1,5)];
  const need=xpForLevel(S.level), cur=S.xp;
  document.getElementById("xpfill").style.width=Math.min(100,(cur/need)*100)+"%";
  document.getElementById("langBtn").textContent=LANG==="en"?"EN":"BM";
}
function toast(msg,color){
  const el=document.getElementById("toast"); el.textContent=msg;
  el.style.background=color||"linear-gradient(135deg,#22c55e,#16a34a)";
  el.classList.remove("show"); void el.offsetWidth; el.classList.add("show");
}
function addXP(n){
  S.xp+=n;
  while(S.xp>=xpForLevel(S.level)){ S.xp-=xpForLevel(S.level); S.level++; onLevelUp(); }
  updateHUD(); save();
}
function onLevelUp(){
  playLevelUp(); toast(t("levelUp")+" Lv"+S.level,"linear-gradient(135deg,#06b6d4,#3b82f6)");
  // year advances every 2 levels up to 6
  const newYear=Math.min(6,Math.floor(S.level/2)+1);
  if(newYear>S.year){ S.year=newYear; toast(RANKS[S.year-1],"linear-gradient(135deg,#7c3aed,#2563eb)"); }
}
function reward(r){
  if(!r) return; let parts=[];
  if(r.xp){ addXP(r.xp); parts.push("+"+r.xp+" XP"); }
  if(r.coins){ S.coins+=r.coins; parts.push("+"+r.coins+" 🪙"); playCoin(); }
  if(r.stars){ S.stars+=r.stars; parts.push("+"+r.stars+" ⭐"); }
  if(r.item){ if(!S.questItems.includes(r.item)) S.questItems.push(r.item); parts.push(r.item); }
  if(r.collectible){ if(!S.collectibles.includes(r.collectible)) S.collectibles.push(r.collectible); parts.push(r.collectible); }
  if(r.pet){ unlockPet(r.pet); }
  updateHUD(); save();
  return parts.join("  ");
}
function unlockPet(p){
  if(!S.pets.includes(p)){ S.pets.push(p); S.activePet=p;
    const info=PET_INFO[p]; toast(t("newPet")+" "+info.emoji,"linear-gradient(135deg,#f59e0b,#d97706)");
    unlockAch("pet_friend");
  }
}
function unlockAch(id){
  if(S.achievements.includes(id)) return; S.achievements.push(id); save(); playAchievement();
  const a=ACHIEVEMENTS[id]; document.getElementById("achLabel").textContent=t("badges");
  document.getElementById("achName").textContent=LANG==="ms"?a.ms:a.en;
  const pop=document.getElementById("achPop"); pop.classList.add("show");
  setTimeout(()=>pop.classList.remove("show"),3200);
}
function recordAnswer(subject,correct){
  if(subject==="any") subject=["math","bm","eng"][ri(0,2)];
  if(S.stats[subject]){ S.stats[subject].a++; if(correct)S.stats[subject].c++; }
  if(correct){
    const total={math:S.stats.math.c,bm:S.stats.bm.c,eng:S.stats.eng.c};
    if(total.math>=15) unlockAch("math_hero");
    if(total.bm>=15) unlockAch("bm_champion");
    if(total.eng>=15) unlockAch("english_master");
  }
  save();
}

/* ============================================================
   MODAL SYSTEM
   ============================================================ */
const modal=document.getElementById("modal"), modalPanel=document.getElementById("modalPanel");
function openModal(html){ modalPanel.innerHTML=html; modal.classList.add("show"); modalPanel.classList.remove("fade"); void modalPanel.offsetWidth; modalPanel.classList.add("fade"); }
function closeModal(){ modal.classList.remove("show"); modalPanel.innerHTML=""; }
modal.addEventListener("click",e=>{ if(e.target===modal) closeModal(); });

/* ============================================================
   INTERACTION
   ============================================================ */
function doInteract(){
  if(!gameActive) return;
  if(modal.classList.contains("show")) return;
  if(!nearEntity) return;
  playClick();
  if(nearEntity.type==="npc") talkNPC(nearEntity.data);
  else if(nearEntity.type==="chest") openChest(nearEntity);
  else if(nearEntity.type==="boss") startBoss(nearEntity);
}

function npcName(n){ return LANG==="ms"?n.name_ms:n.name_en; }
function npcLine(n){ return LANG==="ms"?n.line_ms:n.line_en; }
function qTitle(q){ return LANG==="ms"?q.title_ms:q.title_en; }

function talkNPC(n){
  const hasQuest=n.quest;
  const accepted=hasQuest && S.quests[n.quest.id];
  const completed=hasQuest && S.completedQuests.includes(n.quest.id);
  let body=`<div class="flex items-center gap-3 mb-3">
      <div class="text-5xl float">${n.emoji}</div>
      <div><div class="font-black text-lg">${npcName(n)}</div>
      <div class="pill" style="background:rgba(255,255,255,.12);display:inline-block">${n.mascot?"⭐ Mascot":t("talk")}</div></div></div>
    <div class="glass" style="border-radius:14px;padding:14px;font-size:16px;line-height:1.5">${npcLine(n)}</div>`;
  if(hasQuest && !completed){
    body+=`<div class="mt-3 glass" style="border-radius:14px;padding:12px">
      <div class="font-bold text-yellow-300"><i class="fa-solid fa-scroll"></i> ${qTitle(n.quest)}</div>
      <div class="text-sm opacity-80 mt-1">${t("reward")}: +${n.quest.reward.xp} XP, +${n.quest.reward.coins}🪙${n.quest.reward.pet?", "+PET_INFO[n.quest.reward.pet].emoji:""}${n.quest.reward.item?", "+n.quest.reward.item:""}</div>
    </div>`;
  }
  let btns=`<div class="mt-4 flex gap-2 flex-wrap">`;
  if(hasQuest && !completed){
    btns+=`<button class="btn grad" style="flex:1;padding:14px;border-radius:14px;font-weight:800;font-size:16px" onclick="startQuest('${n.id}','${n.quest.id}')">
      <i class="fa-solid fa-play"></i> ${accepted?t("continue"):t("accept")}</button>`;
  }
  if(completed){ body+=`<div class="mt-3 text-center text-green-300 font-bold"><i class="fa-solid fa-circle-check"></i> ${t("done")}</div>`; }
  btns+=`<button class="btn glass" style="padding:14px 20px;border-radius:14px;font-weight:800" onclick="closeModal()">${t("close")}</button></div>`;
  openModal(body+btns);
}

function startQuest(npcId,questId){
  playClick();
  let npc=null; for(const rk in NPCS){ const f=NPCS[rk].find(x=>x.id===npcId); if(f){npc=f;break;} }
  if(!npc) return;
  if(!S.quests[questId]){ S.quests[questId]={progress:0,done:false,npc:npcId,region:curRegion}; toast(t("questAccepted")); playQuestComplete(); save(); }
  runQuestStep(npc);
}

let activeChallenge=null;
function runQuestStep(npc){
  const q=npc.quest, st=S.quests[q.id];
  if(st.progress>=q.steps){ completeQuest(npc); return; }
  const ch=genChallenge(npc.subject, S.year);
  activeChallenge={ch,npc,onDone:(ok)=>{
    if(ok){ st.progress++; save(); }
  }};
  showChallenge(ch,{
    title:`${qTitle(q)} (${st.progress+1}/${q.steps})`,
    subjectBadge:true, npc,
    onCorrect:()=>{ st.progress++; save();
      setTimeout(()=>{ if(st.progress>=q.steps) completeQuest(npc); else runQuestStep(npc); },650);
    },
    onWrong:()=>{}
  });
}

function completeQuest(npc){
  const q=npc.quest;
  if(!S.completedQuests.includes(q.id)){
    S.completedQuests.push(q.id); S.questsCompleted++; delete S.quests[q.id];
    const got=reward(q.reward); playQuestComplete();
    unlockAch("first_adventure");
    if(S.questsCompleted>=8) unlockAch("legend_explorer");
    entities=regionEntities(curRegion);
    openModal(`<div class="text-center">
      <div class="text-6xl mb-2 float">🎉</div>
      <div class="text-2xl font-black text-yellow-300">${t("questComplete")}</div>
      <div class="text-lg mt-1">${qTitle(q)}</div>
      <div class="glass mt-3" style="border-radius:14px;padding:14px;font-size:18px;font-weight:800">${got}</div>
      <button class="btn grad mt-4" style="padding:14px 28px;border-radius:14px;font-weight:800;font-size:16px" onclick="closeModal()">${t("confirm")}</button>
    </div>`);
  } else closeModal();
}
</script>
<script>
/* ============================================================
   CHALLENGE UI + HINT
   ============================================================ */
const SUBJ_META={ math:{icon:"fa-calculator",c:"#3b82f6",label_en:"Mathematics",label_ms:"Matematik"},
  bm:{icon:"fa-book",c:"#22c55e",label_en:"Bahasa Melayu",label_ms:"Bahasa Melayu"},
  eng:{icon:"fa-language",c:"#f59e0b",label_en:"English",label_ms:"English"},
  any:{icon:"fa-star",c:"#a855f7",label_en:"Mixed",label_ms:"Campuran"} };
let curChallengeState=null;
function subjLabel(s){ const m=SUBJ_META[s]||SUBJ_META.any; return LANG==="ms"?m.label_ms:m.label_en; }

function showChallenge(ch,opts){
  opts=opts||{}; const meta=SUBJ_META[ch.subject]||SUBJ_META.any;
  curChallengeState={ch,opts,attempts:0,answered:false};
  const q=LANG==="ms"?ch.q_ms:ch.q_en;
  const subjBadge=`<span class="pill" style="background:${meta.c}"><i class="fa-solid ${meta.icon}"></i> ${subjLabel(ch.subject)}</span>`;
  let html=`<div class="flex items-center justify-between mb-2">
      <div class="font-black text-lg">${opts.title||t("interact")}</div>${subjBadge}</div>`;
  if(opts.npc) html+=`<div class="flex items-center gap-2 mb-2"><div class="text-3xl">${opts.npc.emoji}</div><div class="text-sm opacity-80">${npcName(opts.npc)}</div></div>`;
  html+=`<div class="glass" style="border-radius:14px;padding:16px;font-size:19px;font-weight:700;line-height:1.5;margin-bottom:6px">${q}</div>
    <div id="choiceWrap">`;
  ch.choices.forEach((c,i)=>{ html+=`<button class="choice btn" data-i="${i}" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${c}</button>`; });
  html+=`</div><div id="chFeedback" class="text-center font-black text-xl mt-2" style="min-height:28px"></div>
    <div class="mt-2 flex gap-2"><button class="btn glass" style="flex:1;padding:12px;border-radius:12px;font-weight:800" onclick="doHint()"><i class="fa-solid fa-lightbulb text-yellow-300"></i> ${t("hint")}</button>
    <button class="btn glass" style="padding:12px 18px;border-radius:12px;font-weight:800" onclick="closeChallenge()">${t("close")}</button></div>`;
  openModal(html);
}
function closeChallenge(){ curChallengeState=null; closeModal(); }

function answer(i){
  const st=curChallengeState; if(!st||st.answered) return;
  const ch=st.ch; const correct=i===ch.answer;
  const btns=document.querySelectorAll("#choiceWrap .choice");
  recordAnswer(ch.subject,correct);
  if(correct){
    st.answered=true;
    btns[i].classList.add("correct"); playCorrect();
    document.getElementById("chFeedback").innerHTML=`<span style="color:#4ade80">✓ ${praise()}</span>`;
    btns.forEach(b=>b.disabled=true);
    if(st.opts.onCorrect) setTimeout(()=>st.opts.onCorrect(),700);
    else { toast(praise()); }
  } else {
    st.attempts++;
    btns[i].classList.add("wrong"); playWrong();
    document.getElementById("chFeedback").innerHTML=`<span style="color:#fca5a5">${encourage()}</span>`;
    setTimeout(()=>{ btns[i].classList.remove("wrong"); btns[i].disabled=true; },800);
    if(st.attempts>=2) setTimeout(()=>showMascotHint(ch),900);
    if(st.opts.onWrong) st.opts.onWrong();
  }
}

function doHint(){
  if(curChallengeState){ showMascotHint(curChallengeState.ch); return; }
  toast(t("hintMsg"),"linear-gradient(135deg,#3b82f6,#1d4ed8)");
}
function showMascotHint(ch){
  // scaffolding hint: eliminate one wrong option + guidance, never the answer directly
  const wrongIdx=ch.choices.map((c,i)=>i).filter(i=>i!==ch.answer);
  const elim=pick(wrongIdx);
  const btns=document.querySelectorAll("#choiceWrap .choice");
  if(btns[elim]){ btns[elim].style.opacity="0.35"; btns[elim].disabled=true; btns[elim].innerHTML+=" ❌"; }
  const fb=document.getElementById("chFeedback");
  if(fb) fb.innerHTML=`<div class="text-sm" style="color:#fcd34d"><i class="fa-solid fa-lightbulb"></i> 🦧 ${t("hintMsg")}</div>`;
  playClick();
}

/* ============================================================
   TREASURE CHEST
   ============================================================ */
function openChest(e){
  const tr=e.data; if(S.chests.includes(tr.id)) return;
  S.chests.push(tr.id); playCoin();
  const got=reward({xp:tr.xp,coins:tr.coins,item:tr.item,collectible:tr.collectible});
  if(S.chests.length>=4) unlockAch("treasure_hunter");
  entities=regionEntities(curRegion);
  openModal(`<div class="text-center">
    <div class="text-7xl mb-2 float">🎁</div>
    <div class="text-2xl font-black text-yellow-300">${t("chest")}</div>
    <div class="glass mt-3" style="border-radius:14px;padding:16px;font-size:18px;font-weight:800">${t("found")}: ${got}</div>
    <button class="btn grad mt-4" style="padding:14px 28px;border-radius:14px;font-weight:800" onclick="closeModal()">${t("confirm")}</button>
  </div>`);
}

/* ============================================================
   BOSS BATTLE
   ============================================================ */
let bossState=null;
function startBoss(e){
  const b=e.data; if(S.bosses.includes(b.id)){ toast(t("done")); return; }
  playBossFight();
  bossState={boss:b,hp:b.hp,maxhp:b.hp,entity:e};
  renderBoss();
}
function renderBoss(){
  const b=bossState.boss; const meta=SUBJ_META[b.subject]||SUBJ_META.any;
  const ch=genChallenge(b.subject,S.year);
  bossState.ch=ch;
  const q=LANG==="ms"?ch.q_ms:ch.q_en;
  const hpPct=(bossState.hp/bossState.maxhp)*100;
  let html=`<div class="text-center mb-2">
      <div class="pill" style="background:#ef4444;display:inline-block"><i class="fa-solid fa-skull"></i> ${t("boss")}</div>
      <div class="text-xl font-black mt-1">${LANG==="ms"?b.name_ms:b.name_en}</div></div>
    <div class="text-center text-6xl mb-2" id="bossEmoji">${b.emoji}</div>
    <div class="flex items-center gap-2 mb-1"><span class="text-sm font-bold">${t("hp")}</span>
      <div class="hpbar" style="flex:1"><div class="hpfill" style="width:${hpPct}%"></div></div>
      <span class="text-sm font-bold">${bossState.hp}/${bossState.maxhp}</span></div>
    <div class="text-xs opacity-70 mb-2 text-center">${t("bossDefeat")}</div>
    <div class="glass" style="border-radius:14px;padding:16px;font-size:18px;font-weight:700;line-height:1.5">
      <span class="pill" style="background:${meta.c};font-size:11px"><i class="fa-solid ${meta.icon}"></i> ${subjLabel(ch.subject)}</span>
      <div class="mt-2">${q}</div></div>
    <div id="choiceWrap" class="mt-2">`;
  ch.choices.forEach((c,i)=>{ html+=`<button class="choice btn" data-i="${i}" onclick="bossAnswer(${i})">${String.fromCharCode(65+i)}. ${c}</button>`; });
  html+=`</div><div id="chFeedback" class="text-center font-black text-lg mt-1" style="min-height:24px"></div>
    <div class="mt-1 flex gap-2"><button class="btn glass" style="flex:1;padding:10px;border-radius:12px;font-weight:800" onclick="doHint()"><i class="fa-solid fa-lightbulb text-yellow-300"></i> ${t("hint")}</button>
    <button class="btn glass" style="padding:10px 16px;border-radius:12px;font-weight:800" onclick="bossFlee()">${t("back")}</button></div>`;
  curChallengeState={ch,opts:{},attempts:0,answered:false};
  openModal(html);
}
function bossFlee(){ bossState=null; curChallengeState=null; closeModal(); }
function bossAnswer(i){
  const st=curChallengeState; if(!st||st.answered) return;
  const ch=bossState.ch; const correct=i===ch.answer;
  const btns=document.querySelectorAll("#choiceWrap .choice");
  recordAnswer(ch.subject,correct);
  if(correct){
    st.answered=true; btns.forEach(b=>b.disabled=true); btns[i].classList.add("correct"); playCorrect();
    bossState.hp--; 
    document.getElementById("chFeedback").innerHTML=`<span style="color:#4ade80">✓ ${t("yourTurn")}</span>`;
    const be=document.getElementById("bossEmoji"); if(be){ be.style.transition="transform .2s"; be.style.transform="translateX(-12px) rotate(-8deg)"; setTimeout(()=>be.style.transform="",250); }
    setTimeout(()=>{ if(bossState.hp<=0) winBoss(); else renderBoss(); },800);
  } else {
    st.attempts++; btns[i].classList.add("wrong"); playWrong();
    document.getElementById("chFeedback").innerHTML=`<span style="color:#fca5a5">${encourage()}</span>`;
    setTimeout(()=>{ btns[i].classList.remove("wrong"); btns[i].disabled=true; },700);
    if(st.attempts>=2) setTimeout(()=>showMascotHint(ch),800);
  }
}
function winBoss(){
  const b=bossState.boss;
  if(!S.bosses.includes(b.id)) S.bosses.push(b.id);
  unlockAch("boss_slayer"); playVictory();
  const rw=reward({xp:80+S.year*20,coins:60,stars:2});
  // grant a certificate for the boss subject
  grantCertificate(b.subject);
  bossState=null; curChallengeState=null; entities=regionEntities(curRegion);
  openModal(`<div class="text-center">
    <div class="text-7xl mb-2 float">🏆</div>
    <div class="text-3xl font-black text-yellow-300">${t("victory")}</div>
    <div class="text-lg mt-1">${LANG==="ms"?b.name_ms:b.name_en} ✓</div>
    <div class="glass mt-3" style="border-radius:14px;padding:14px;font-weight:800;font-size:18px">${rw}</div>
    <button class="btn grad mt-4" style="padding:14px 28px;border-radius:14px;font-weight:800" onclick="closeModal()">${t("confirm")}</button>
  </div>`);
}
function grantCertificate(subject){
  if(subject==="any") subject="math";
  const id=subject+"_y"+S.year;
  if(!S.certificates.find(c=>c.id===id)){
    S.certificates.push({id,subject,year:S.year,date:new Date().toLocaleDateString()}); save();
  }
}
</script>
<script>

/* ---- INVENTORY ---- */
function toggleInventory(){ if(modal.classList.contains("show")) closeModal(); else openInventory(); }
function openInventory(){ playClick();

/* ---- QUESTS ---- */
function openQuests(){ playClick();

    html+=`<div class="font-bold text-yellow-300 mb-2">${t("active")}</div>`;

      if(!npc) return; const q=npc.quest;
      html+=`<div class="glass mb-2" style="border-radius:14px;padding:12px">
        <div class="flex justify-between"><div class="font-bold">${npc.emoji} ${qTitle(q)}</div>
        <span class="pill" style="background:${SUBJ_META[npc.subject].c};font-size:11px">${subjLabel(npc.subject)}</span></div>
        <div class="text-xs opacity-70 mt-1">${t("region")}: ${LANG==="ms"?REGIONS[st.region].name_ms:REGIONS[st.region].name_en} • ${st.progress}/${q.steps}</div>
        <div class="hpbar mt-1" style="height:8px"><div class="hpfill" style="width:${st.progress/q.steps*100}%;background:linear-gradient(90deg,#22c55e,#06b6d4)"></div></div></div>`;
    });
  }
  if(S.completedQuests.length){
    html+=`<div class="font-bold text-green-300 mb-2 mt-3">${t("done")} (${S.completedQuests.length})</div><div class="flex flex-wrap gap-2">`;
    S.completedQuests.forEach(qid=>{ let q=null; for(const rk in NPCS){ const f=NPCS[rk].find(x=>x.quest&&x.quest.id===qid); if(f){q=f.quest;break;} } if(q) html+=`<span class="pill" style="background:rgba(34,197,94,.25)">✓ ${qTitle(q)}</span>`; });

  openModal(html);
}

/* ---- WORLD MAP / TRAVEL ---- */
function openMap(){ playClick();
  let html=header(t("map"),"fa-map");
  html+=`<div class="grid grid-cols-1 gap-3">`;
  REGION_ORDER.forEach(rk=>{ const r=REGIONS[rk]; const unlocked=S.level>=(r.minLevel-1) || rk==="kampung" || S.year>=r.minLevel;
    const isUnlocked = rk==="kampung" || S.level>= (r.minLevel*2-2) || S.year>=r.minLevel;
    const open = rk==="kampung" || S.year>=r.minLevel || S.level>=(r.minLevel-1)*2+1;
    const ok = canEnter(rk);
    html+=`<div class="glass btn" style="border-radius:16px;padding:14px;border-left:6px solid ${r.accent};${ok?'':'opacity:.55'}" ${ok?`onclick="travelTo('${rk}')"`:""}>
      <div class="flex items-center justify-between">
        <div><div class="font-black">${LANG==="ms"?r.name_ms:r.name_en} ${curRegion===rk?'<i class="fa-solid fa-location-dot text-green-400"></i>':''}</div>
        <div class="text-xs opacity-70">${LANG==="ms"?r.desc_ms:r.desc_en}</div></div>
        <div>${ok?`<span class="pill grad">${t("travel")}</span>`:`<span class="pill" style="background:#475569"><i class="fa-solid fa-lock"></i> ${t("locked")} Lv${(r.minLevel-1)*2+1}</span>`}</div>
      </div></div>`;
  });
  html+=`</div>`;
  openModal(html);
}
function canEnter(rk){ if(rk==="kampung") return true; const r=REGIONS[rk]; return S.level>=((r.minLevel-1)*2+1) || S.year>=r.minLevel; }
function travelTo(rk){ if(!canEnter(rk)){ toast(t("locked")); return; } playClick(); closeModal(); enterRegion(rk); toast((LANG==="ms"?REGIONS[rk].name_ms:REGIONS[rk].name_en)); }

/* ---- PARENT DASHBOARD ---- */
function openParent(){ playClick();
  const acc=s=>{ const d=S.stats[s]; return d.a?Math.round(d.c/d.a*100):0; };
  const totalA=S.stats.math.a+S.stats.bm.a+S.stats.eng.a;
  const totalC=S.stats.math.c+S.stats.bm.c+S.stats.eng.c;
  const overall=totalA?Math.round(totalC/totalA*100):0;
  const mins=Math.floor(S.timePlayed/60), secs=S.timePlayed%60;
  let html=header(t("parent"),"fa-chart-line");
  html+=`<div class="grid grid-cols-2 gap-3 mb-3">
    ${statCard("fa-clock",t("timePlayed"),mins+"m "+secs+"s","#3b82f6")}
    ${statCard("fa-bolt",t("xpEarned"),(S.level-1)*200+S.xp+"","#06b6d4")}
    ${statCard("fa-bullseye",t("accuracy"),overall+"%","#22c55e")}
    ${statCard("fa-scroll",t("questsDone"),S.questsCompleted+"","#f59e0b")}
  </div>`;
  html+=`<div class="glass" style="border-radius:16px;padding:14px;margin-bottom:12px">
    <div class="font-bold mb-2">${t("progBySubj")}</div>`;
  [["math",t("math")],["bm",t("bm")],["eng",t("eng")]].forEach(([k,lbl])=>{
    const a=acc(k); html+=`<div class="mb-2"><div class="flex justify-between text-sm"><span>${lbl}</span><span>${a}% (${S.stats[k].c}/${S.stats[k].a})</span></div>
      <div class="hpbar" style="height:10px"><div class="hpfill" style="width:${a}%;background:${SUBJ_META[k].c}"></div></div></div>`;
  });
  html+=`</div>`;
  html+=`<div class="glass" style="border-radius:16px;padding:14px;margin-bottom:12px">
    <div class="font-bold mb-2">${t("skills")} & ${t("subjects")}</div>
    <div class="text-sm opacity-85">${t("region")}: ${LANG==="ms"?REGIONS[curRegion].name_ms:REGIONS[curRegion].name_en} • ${RANKS[S.year-1]}</div>
    <div class="text-sm opacity-85 mt-1">${t("badges")}: ${S.achievements.length}/8 • ${t("certs")}: ${S.certificates.length} • ${t("pets")}: ${S.pets.length}</div>
    <div class="text-sm opacity-85 mt-2"><b>${t("insights")}:</b> ${insightText(overall)}</div>

    html+=`</div>`;
  } else html+=`<div class="text-sm opacity-60 mb-2">${t("noData")}</div>`;
  openModal(html);
}
function statCard(icon,label,val,color){ return `<div class="glass" style="border-radius:16px;padding:14px;text-align:center">

function insightText(o){

  if(o>=50) return LANG==="ms"?"Kemajuan baik. Berlatih lagi untuk menguasai.":"Good progress. Practice more to master skills.";

}

  // year select
  const yg=document.getElementById("yrGrid"); creationYear=S.year||1;
  for(let y=1;y<=6;y++){ const b=document.createElement("button"); b.className="btn pill "+(y===creationYear?"grad":"glass"); b.style.padding="10px 14px"; b.textContent=t("year")+" "+y;
    b.onclick=()=>{ creationYear=y; playClick(); document.querySelectorAll("#yrGrid button").forEach((x,j)=>{ x.className="btn pill "+(j+1===y?"grad":"glass"); x.style.padding="10px 14px"; }); }; yg.appendChild(b); }
}
let creationYear=1;
function finishCreation(){ playClick();
  const nm=(document.getElementById("nameInput").value||"").trim();
  S=JSON.parse(JSON.stringify(DEFAULT_STATE));
  S.name=nm||(LANG==="ms"?"Wira":"Hero"); S.avatar=creationAvatar; S.year=creationYear; S.level=Math.max(1,(creationYear-1)*2+1); S.created=true; S.lang=LANG;
  save(); removeTitle(); startGame();
  setTimeout(()=>{ toast(t("welcome"),"linear-gradient(135deg,#7c3aed,#06b6d4)"); unlockAch("first_adventure"); },300);
}

function startGame(){
  gameActive=true;
  player.x=S.px||Math.floor(WORLD_W/2)*TILE+TILE/2;
  player.y=S.py||Math.floor(WORLD_H/2)*TILE+TILE/2;
  if(!S.px){ enterRegion(S.region||"kampung"); }
  else { enterRegion(S.region||"kampung",true); player.x=S.px; player.y=S.py; }
  updateHUD();
}

/* BOOT */
load();
updateHUD();
showTitle();
window.addEventListener("beforeunload",save);
document.addEventListener("visibilitychange",()=>{ if(document.hidden) save(); });
</script>
</body>
</html>
