name: Build (KSSR Adventure Academy)

# The app is now a serverful Next.js app (Prisma + SQLite/MySQL), so it is no
# longer deployed to static GitHub Pages. It runs offline locally and on a VPS
# (Hostinger/Exabytes). This workflow only verifies the build on demand.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kssr-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kssr-platform/package-lock.json
      - run: npm ci
      - run: npm run build:packages
      - name: Prisma generate
        working-directory: kssr-platform/apps/web
        env:
          DATABASE_URL: "file:./dev.db"
        run: npx prisma generate
      - name: Build web (serverful)
        working-directory: kssr-platform/apps/web
        env:
          DATABASE_URL: "file:./dev.db"
        run: npm run build
